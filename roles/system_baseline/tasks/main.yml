---
- name: Set hostname to match inventory name
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Set timezone
  community.general.timezone:
    name: "{{ system_timezone }}"
  notify: Restart cron

- name: Install baseline packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name: "{{ system_baseline_packages }}"
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install baseline packages (Amazon Linux / RedHat)
  ansible.builtin.dnf:
    name: "{{ system_baseline_packages }}"
    state: present
  when: ansible_os_family == "RedHat"

- name: Update all packages (Amazon Linux / RedHat)
  ansible.builtin.dnf:
    name: "*"
    state: latest
  when:
    - ansible_os_family == "RedHat"
    - system_update_packages | bool

- name: Update all packages (Debian/Ubuntu)
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  when:
    - ansible_os_family == "Debian"
    - system_update_packages | bool
