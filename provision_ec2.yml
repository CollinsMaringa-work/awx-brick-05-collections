---
- name: Provision EC2 instance
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: us-east-1
    instance_type: t2.micro
    ami_id: ami-0c421724a94bba6d6   # see Step 7a below
    key_pair_name: awx-brick5-key
    security_group_name: awx-learning-sg
    instance_name: awx-brick5-ec2
    ssh_public_key: "SET_VIA_AWX_EXTRA_VARS"

  tasks:
    - name: Ensure SSH key pair exists in AWS
      amazon.aws.ec2_key:
        name: "{{ key_pair_name }}"
        key_material: "{{ ssh_public_key }}"
        region: "{{ aws_region }}"
        state: present

    - name: Get default VPC
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          isDefault: "true"
      register: vpc_info

    - name: Get default subnet
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ aws_region }}"
        filters:
          vpc-id: "{{ vpc_info.vpcs[0].vpc_id }}"
          defaultForAz: "true"
      register: subnet_info

    - name: Ensure security group exists
      amazon.aws.ec2_security_group:
        name: "{{ security_group_name }}"
        description: AWX learning security group
        region: "{{ aws_region }}"
        vpc_id: "{{ vpc_info.vpcs[0].vpc_id }}"
        rules:
          - proto: tcp
            ports: [22]
            cidr_ip: 0.0.0.0/0
          - proto: tcp
            ports: [80]
            cidr_ip: 0.0.0.0/0
        state: present
      register: sg_info

    - name: Launch EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ instance_name }}"
        region: "{{ aws_region }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        key_name: "{{ key_pair_name }}"
        vpc_subnet_id: "{{ subnet_info.subnets[0].subnet_id }}"
        network:
          assign_public_ip: true
        security_groups:
          - "{{ security_group_name }}"
        tags:
          Environment: awx-learning
          Brick: brick-05
          Name: "{{ instance_name }}"
        state: running
        wait: true
      register: ec2_info

    - name: Show provisioned instance details
      ansible.builtin.debug:
        msg:
          - "Instance ID : {{ ec2_info.instances[0].instance_id }}"
          - "Public IP   : {{ ec2_info.instances[0].public_ip_address }}"

    - name: Wait for SSH to become available
      ansible.builtin.wait_for:
        host: "{{ ec2_info.instances[0].public_ip_address }}"
        port: 22
        delay: 15
        timeout: 180
        state: started
